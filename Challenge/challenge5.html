<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Bar Layout</title>
    <link rel="stylesheet" href="challenge5.css">
</head>
<body>

    <div class="row">
        <div class="red"></div>
        <div class="pink"></div>
    </div>

    <div class="row">
        <div class="yellow"></div>
        <div class="cream"></div>
    </div>

    <div class="row">
        <div class="blue-dark"></div>
        <div class="blue-light"></div>
    </div>

    <div class="row">
        <div class="green-dark"></div>
        <div class="green-light"></div>
    </div>

    <div class="row">
        <div class="purple-dark"></div>
        <div class="purple-light"></div>
    </div>

    <div class="row">
        <div class="mint"></div>
        <div class="green-dark"></div>
    </div>

    <div class="row">
        <div class="sky"></div>
        <div class="blue-dark"></div>
    </div>

    <div class="row">
        <div class="cream"></div>
        <div class="yellow"></div>
    </div>

    <div class="row">
        <div class="pink"></div>
        <div class="red"></div>
    </div>

</body>
</html>
